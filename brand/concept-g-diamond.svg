<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- bg -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- outer diamond (rotated square) — stroke only -->
  <rect x="130" y="130" width="252" height="252" rx="14" transform="rotate(45 256 256)"
        fill="none" stroke="url(#g)" stroke-width="28"/>
  <!-- inner diamond — filled, smaller -->
  <rect x="178" y="178" width="156" height="156" rx="8" transform="rotate(45 256 256)"
        fill="url(#g)"/>
</svg>
