<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lf" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="glow-g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="blur-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d1117"/>

  <!-- Subtle inner-border -->
  <rect x="1" y="1" width="510" height="510" rx="95"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- Glow bloom behind mark (soft) -->
  <g filter="url(#blur-glow)" opacity="0.7">
    <!-- left vertical -->
    <rect x="120" y="80"  width="72" height="352" rx="8" fill="url(#glow-g)"/>
    <!-- top bar -->
    <rect x="192" y="80"  width="200" height="72"  rx="8" fill="url(#glow-g)"/>
    <!-- bottom foot -->
    <rect x="192" y="360" width="200" height="72"  rx="8" fill="url(#glow-g)"/>
  </g>

  <!-- LF monogram — left vertical (shared stem) -->
  <rect x="120" y="80"  width="72" height="352" rx="10" fill="url(#lf)"/>
  <!-- Top bar  (F top = L implied top) -->
  <rect x="192" y="80"  width="200" height="72"  rx="10" fill="url(#lf)"/>
  <!-- Middle bar (F mid — shorter) -->
  <rect x="192" y="224" width="136" height="64"  rx="10" fill="url(#lf)"/>
  <!-- Bottom foot (L) -->
  <rect x="192" y="360" width="200" height="72"  rx="10" fill="url(#lf)"/>
</svg>
