<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/LootFlow/icon.svg" />
    <link rel="apple-touch-icon" href="/LootFlow/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="LootFlow – Analytics premium de drops semanais de CS2" />
    <meta name="theme-color" content="#07090f" />
    <!-- ── Security headers (GitHub Pages doesn't support HTTP headers, so we use meta) ── -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://*.steamstatic.com https://*.akamaihd.net https://lh3.googleusercontent.com;
      connect-src 'self'
        https://*.googleapis.com https://*.google.com
        https://*.firebaseio.com https://*.firebaseapp.com wss://*.firebaseio.com
        https://corsproxy.io https://api.allorigins.win https://api.codetabs.com
        https://steamcommunity.com https://economia.awesomeapi.com.br;
      frame-src https://*.firebaseapp.com https://accounts.google.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    "/>
    <meta http-equiv="Permissions-Policy" content="
      camera=(), microphone=(), geolocation=(), payment=(), usb=(),
      interest-cohort=()
    "/>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LootFlow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>LootFlow – CS2 Drop Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Figtree:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: #07090f;
        color: #e2e8f0;
        font-family: 'Figtree', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      ::selection { background: rgba(56,189,248,0.3); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
