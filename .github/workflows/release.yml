name: 🖥️ Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (.pkg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + Electron)
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: release/*.pkg
          if-no-files-found: error

  build-win:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + Electron)
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: release/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: mac-pkg
          path: artifacts-raw/mac/

      - uses: actions/download-artifact@v4
        with:
          name: win-exe
          path: artifacts-raw/win/

      - name: Rename artifacts with platform + version
        run: |
          VERSION=${{ github.ref_name || inputs.version }}
          mkdir -p artifacts
          for f in artifacts-raw/mac/*.pkg; do
            cp "$f" "artifacts/LootFlow-mac-${VERSION}.pkg"
          done
          for f in artifacts-raw/win/*.exe; do
            cp "$f" "artifacts/LootFlow-windows-${VERSION}.exe"
          done
          ls -lh artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          name: LootFlow ${{ github.ref_name || inputs.version }}
          body: |
            ## LootFlow Desktop ${{ github.ref_name || inputs.version }}

            ### O que mudou
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### Download
            | Plataforma | Arquivo |
            |---|---|
            | 🍎 macOS | `LootFlow-mac-${{ github.ref_name || inputs.version }}.pkg` — instalar normalmente, se Gatekeeper bloquear: clique com botão direito → Abrir |
            | 🪟 Windows | `LootFlow-windows-${{ github.ref_name || inputs.version }}.exe` — se SmartScreen alertar: "Mais informações" → "Executar assim mesmo" |

            ### Requisitos
            - macOS 10.15+ (Catalina ou superior)
            - Windows 10+

            > ⚠️ Sem assinatura de código. Os alertas do sistema são esperados.
          files: artifacts/*
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
