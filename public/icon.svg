<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#07090f"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Box shape -->
  <path d="M256 120 L380 185 L380 315 L256 380 L132 315 L132 185 Z" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linejoin="round"/>
  <!-- Vertical center line -->
  <line x1="256" y1="120" x2="256" y2="380" stroke="url(#accent)" stroke-width="10" stroke-dasharray="16 10"/>
  <!-- Horizontal mid line -->
  <line x1="132" y1="250" x2="380" y2="250" stroke="url(#accent)" stroke-width="10" opacity="0.5"/>
  <!-- Arrow up-right -->
  <polyline points="200,300 256,200 312,230" fill="none" stroke="#38bdf8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="312" cy="230" r="14" fill="#38bdf8"/>
</svg>
