<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- glow bloom -->
  <polygon points="256,88 384,186 384,326 256,424 128,326 128,186"
           fill="url(#g)" filter="url(#glow)" opacity="0.3"/>
  <!-- gem outline / main shape — hexagon -->
  <polygon points="256,88 384,186 384,326 256,424 128,326 128,186"
           fill="url(#g)"/>
  <!-- inner facet lines — creates gem feel -->
  <polygon points="256,88 384,186 256,224 128,186"
           fill="rgba(255,255,255,0.14)"/>
  <polygon points="256,224 384,186 384,326 256,424 128,326 128,186"
           fill="rgba(0,0,0,0.18)"/>
  <!-- center divider line -->
  <line x1="128" y1="186" x2="256" y2="224" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <line x1="384" y1="186" x2="256" y2="224" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <line x1="128" y1="326" x2="256" y2="224" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
  <line x1="384" y1="326" x2="256" y2="224" stroke="rgba(0,0,0,0.2)" stroke-width="2"/>
</svg>
