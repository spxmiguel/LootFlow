<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- bg -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- Mark: asymmetric chevron (top arm longer/steeper) + green foot -->
  <!-- vertex at left-center -->
  <!-- top arm → upper right, steep -->
  <line x1="148" y1="256" x2="356" y2="96"
        stroke="white" stroke-width="72" stroke-linecap="round"/>
  <!-- bottom arm → lower right, shallower = asymmetry -->
  <line x1="148" y1="256" x2="304" y2="368"
        stroke="white" stroke-width="72" stroke-linecap="round"/>
  <!-- green foot: horizontal from bottom arm tip -->
  <line x1="304" y1="368" x2="412" y2="368"
        stroke="#4ade80" stroke-width="56" stroke-linecap="round"/>
</svg>
