<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- glow -->
  <path d="M100,360 C140,280 180,320 256,200 C332,80 372,140 412,100"
        fill="none" stroke="url(#g)" stroke-width="52" stroke-linecap="round"
        filter="url(#glow)" opacity="0.4"/>
  <!-- main S-curve flow line — thick, bold -->
  <path d="M100,360 C140,280 180,320 256,200 C332,80 372,140 412,100"
        fill="none" stroke="url(#g)" stroke-width="52" stroke-linecap="round"/>
  <!-- dot at start (data point) -->
  <circle cx="100" cy="360" r="26" fill="#4ade80"/>
  <!-- dot at end -->
  <circle cx="412" cy="100" r="26" fill="#38bdf8"/>
</svg>
