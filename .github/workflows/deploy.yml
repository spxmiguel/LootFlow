name: 🚀 Deploy LootFlow to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBUVMtSUg92u4D5UpMZNRe5plikiOmNddk
          VITE_FIREBASE_AUTH_DOMAIN: lootflow-92afd.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: lootflow-92afd
          VITE_FIREBASE_STORAGE_BUCKET: lootflow-92afd.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1008615127332"
          VITE_FIREBASE_APP_ID: 1:1008615127332:web:37c760fa37dd37eb8d9bb1
          VITE_FIREBASE_MEASUREMENT_ID: G-REHSJLRPQ6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
