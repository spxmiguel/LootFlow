<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>
  <!-- bg -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- glow bloom -->
  <path d="M256,100 C330,100 390,160 390,270 A134,134 0 1,1 122,270 C122,160 182,100 256,100 Z"
        fill="url(#g)" filter="url(#glow)" opacity="0.35"/>
  <!-- drop shape -->
  <path d="M256,100 C330,100 390,160 390,270 A134,134 0 1,1 122,270 C122,160 182,100 256,100 Z"
        fill="url(#g)"/>
  <!-- inner highlight -->
  <ellipse cx="220" cy="210" rx="28" ry="44" fill="rgba(255,255,255,0.18)" transform="rotate(-18,220,210)"/>
</svg>
