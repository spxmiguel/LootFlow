<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- bg -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- 4 squares arranged in 2x2 grid — Figma-style but unique -->
  <!-- top-left: large solid green -->
  <rect x="112" y="112" width="128" height="128" rx="16" fill="url(#g1)"/>
  <!-- top-right: large solid blue -->
  <rect x="272" y="112" width="128" height="128" rx="16" fill="url(#g2)"/>
  <!-- bottom-left: outline only -->
  <rect x="112" y="272" width="128" height="128" rx="16" fill="none" stroke="url(#g3)" stroke-width="16"/>
  <!-- bottom-right: solid gradient, smaller/inset -->
  <rect x="272" y="272" width="128" height="128" rx="16" fill="url(#g3)" opacity="0.45"/>
  <!-- center intersection highlight -->
  <rect x="240" y="240" width="32" height="32" rx="4" fill="rgba(255,255,255,0.06)"/>
</svg>
