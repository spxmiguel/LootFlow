<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LootFlow Mark — Preview</title>
<style>
  * { box-sizing: border-box; }
  body { background: #080b0f; font-family: -apple-system, sans-serif; margin: 0; padding: 56px; color: #e6edf3; }

  h2 { font-size: 11px; color: #6b7280; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; margin: 0 0 32px; }

  /* ── size scale ── */
  .sizes { display: flex; align-items: flex-end; gap: 32px; margin-bottom: 64px; }
  .size-item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .size-label { font-size: 10px; color: #6b7280; font-family: monospace; }
  .mark-bg {
    background: #0a0e15;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .mark-bg img { display: block; }

  /* ── nav simulation ── */
  .nav-sim {
    display: inline-flex; align-items: center; gap: 10px;
    background: rgba(13,17,23,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 10px 18px;
    margin-bottom: 48px;
  }
  .nav-logo-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: #0a0e15; border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .nav-wordmark { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .nav-links { display: flex; gap: 4px; margin-left: 16px; }
  .nav-link { font-size: 13px; color: #9ba3af; padding: 6px 10px; border-radius: 6px; }
  .nav-link:last-child { background: #0d1117; border: 1px solid rgba(255,255,255,0.12); color: #e6edf3; font-weight: 600; }

  /* ── sidebar simulation ── */
  .sidebar-sim {
    width: 240px;
    background: #0b0f15;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 48px;
  }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.07); margin-bottom: 12px; }
  .sidebar-mark { width: 32px; height: 32px; border-radius: 10px; background: #0a0e15; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .sidebar-name { font-weight: 700; font-size: 15px; }
  .sidebar-sub { font-size: 10px; color: #6b7280; margin-top: 1px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 8px 6px; border-radius: 8px; font-size: 13px; color: #9ba3af; }
  .sidebar-item.active { background: rgba(255,255,255,0.06); color: #e6edf3; font-weight: 600; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }

  .row { display: flex; gap: 40px; align-items: flex-start; }
</style>
</head>
<body>

<h2>Mark — Tamanhos</h2>
<div class="sizes">
  <div class="size-item">
    <div class="mark-bg" style="width:512px;height:512px;border-radius:100px;">
      <img src="../public/icon.svg" width="512" height="512"/>
    </div>
    <div class="size-label">512px — app icon / og image</div>
  </div>
  <div class="size-item">
    <div class="mark-bg" style="width:96px;height:96px;border-radius:22px;">
      <img src="../public/icon.svg" width="96" height="96"/>
    </div>
    <div class="size-label">96px</div>
  </div>
  <div class="size-item">
    <div class="mark-bg" style="width:48px;height:48px;border-radius:12px;">
      <img src="../public/icon.svg" width="48" height="48"/>
    </div>
    <div class="size-label">48px</div>
  </div>
  <div class="size-item">
    <div class="mark-bg" style="width:32px;height:32px;border-radius:9px;">
      <img src="../public/icon.svg" width="32" height="32"/>
    </div>
    <div class="size-label">32px</div>
  </div>
  <div class="size-item">
    <div class="mark-bg" style="width:24px;height:24px;border-radius:7px;">
      <img src="../public/icon.svg" width="24" height="24"/>
    </div>
    <div class="size-label">24px</div>
  </div>
  <div class="size-item">
    <div class="mark-bg" style="width:16px;height:16px;border-radius:4px;">
      <img src="../public/icon.svg" width="16" height="16"/>
    </div>
    <div class="size-label">16px</div>
  </div>
</div>

<div class="row">
  <div>
    <h2>Nav</h2>
    <div class="nav-sim">
      <div class="nav-logo-mark">
        <img src="../public/icon.svg" width="22" height="22"/>
      </div>
      <span class="nav-wordmark">LootFlow</span>
      <div class="nav-links">
        <span class="nav-link">Features</span>
        <span class="nav-link">How it works</span>
        <span class="nav-link">Open LootFlow</span>
      </div>
    </div>
  </div>

  <div>
    <h2>Sidebar</h2>
    <div class="sidebar-sim">
      <div class="sidebar-logo">
        <div class="sidebar-mark">
          <img src="../public/icon.svg" width="28" height="28"/>
        </div>
        <div>
          <div class="sidebar-name">LootFlow</div>
          <div class="sidebar-sub">CS2 Analytics</div>
        </div>
      </div>
      <div class="sidebar-item active"><div class="dot"></div> Dashboard</div>
      <div class="sidebar-item">📦 Drops</div>
      <div class="sidebar-item">👥 Contas</div>
      <div class="sidebar-item">📊 Analytics</div>
      <div class="sidebar-item">🎯 Metas</div>
    </div>
  </div>
</div>

</body>
</html>
