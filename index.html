<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LootFlow – Analytics premium de drops semanais de CS2" />
    <meta name="theme-color" content="#07090f" />
    <title>LootFlow – CS2 Drop Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Figtree:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      body {
        background: #07090f;
        color: #e2e8f0;
        font-family: 'Figtree', sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
      ::selection { background: rgba(56,189,248,0.3); }
    </style>
  </head>

    <div id="root"></div>
