<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="g2" x1="512" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <!-- bg -->
  <rect width="512" height="512" rx="100" fill="#0d1117"/>
  <rect x="1" y="1" width="510" height="510" rx="99" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <!-- connection lines (behind) -->
  <line x1="160" y1="340" x2="352" y2="340" stroke="url(#g2)" stroke-width="14" stroke-linecap="round"/>
  <line x1="160" y1="340" x2="256" y2="175" stroke="url(#g2)" stroke-width="14" stroke-linecap="round"/>
  <line x1="352" y1="340" x2="256" y2="175" stroke="url(#g2)" stroke-width="14" stroke-linecap="round"/>
  <!-- nodes — three accounts being tracked -->
  <!-- top center: primary account / hub -->
  <circle cx="256" cy="175" r="42" fill="url(#g)"/>
  <!-- bottom left -->
  <circle cx="160" cy="340" r="30" fill="url(#g)" opacity="0.85"/>
  <!-- bottom right -->
  <circle cx="352" cy="340" r="30" fill="url(#g)" opacity="0.85"/>
  <!-- center inner dot on main node -->
  <circle cx="256" cy="175" r="16" fill="rgba(255,255,255,0.25)"/>
</svg>
